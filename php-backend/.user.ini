; Portal usuarios — PHP overrides (SiteGround lee .user.ini por directorio; tarda
; hasta ~5 min en tomar cambios por el cache de PHP-FPM).
;
; Sesión de larga vida (7 días). El cookie ya dura 7 días y se renueva en cada
; request, pero sin esto el GC del servidor (default ~24 min) borra el ARCHIVO de
; sesión por inactividad y el usuario ve "No autenticado" al volver.
session.gc_maxlifetime = 604800
